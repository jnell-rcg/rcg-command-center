name: Build Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=512"
          # Dummy key so build doesn't fail on missing env var checks
          ANTHROPIC_API_KEY: "sk-ant-placeholder"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Build failed — Railway will NOT deploy this push."
          echo "Check the Actions tab on GitHub for the error details."
