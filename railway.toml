[build]
builder = "nixpacks"
buildCommand = "NODE_OPTIONS='--max-old-space-size=512' npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static"

[deploy]
startCommand = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
